<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Sky blue background -->
  <rect width="512" height="512" fill="#0ea5e9"/>

  <!-- White calendar card -->
  <rect x="80" y="108" width="352" height="300" rx="28" fill="white"/>

  <!-- Sky-300 header bar (rounded top only via two overlapping rects) -->
  <rect x="80" y="108" width="352" height="80" rx="28" fill="#7dd3fc"/>
  <rect x="80" y="160" width="352" height="28" fill="#7dd3fc"/>

  <!-- Header: three month-nav dots -->
  <circle cx="216" cy="148" r="9" fill="white" fill-opacity="0.45"/>
  <circle cx="256" cy="148" r="13" fill="white"/>
  <circle cx="296" cy="148" r="9" fill="white" fill-opacity="0.45"/>

  <!-- 10 category dots: 5 × 2 grid -->
  <circle cx="144" cy="260" r="21" fill="#0ea5e9"/>
  <circle cx="204" cy="260" r="21" fill="#0ea5e9"/>
  <circle cx="256" cy="260" r="21" fill="#0ea5e9"/>
  <circle cx="308" cy="260" r="21" fill="#0ea5e9"/>
  <circle cx="368" cy="260" r="21" fill="#0ea5e9"/>

  <circle cx="144" cy="336" r="21" fill="#0ea5e9"/>
  <circle cx="204" cy="336" r="21" fill="#0ea5e9"/>
  <circle cx="256" cy="336" r="21" fill="#0ea5e9"/>
  <circle cx="308" cy="336" r="21" fill="#0ea5e9"/>
  <circle cx="368" cy="336" r="21" fill="#0ea5e9" fill-opacity="0.2"/>
</svg>
